
<!DOCTYPE html>
<html lang="ar" dir="rtl" x-data="{ theme: localStorage.getItem('theme') || 'day' }" :class="theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معلم بلس | Mo3llim Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Cairo', sans-serif; transition: background-color 0.5s ease; }
        .day { background-color: #fdfbf7; color: #0f172a; }
        .night { background-color: #0a0a0a; color: #f1f5f9; }
        @media print { .no-print { display: none !important; } }
        .animate-fadeIn { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body :class="theme === 'day' ? 'day' : 'night'">
    <header class="sticky top-0 z-50 shadow-sm border-b no-print transition-all duration-500"
            :class="theme === 'day' ? 'bg-white/90 backdrop-blur border-orange-100' : 'bg-[#161616]/90 backdrop-blur border-gray-800'">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <!-- Centered & Aligned Logo [معلم + Plus] -->
            <a href="/" class="inline-flex items-center gap-3 transition-transform hover:scale-105 active:scale-95 group font-black">
                <span class="text-3xl tracking-tight leading-none transition-colors duration-500"
                    :class="theme === 'day' ? 'text-slate-900' : 'text-white'">
                    معلم
                </span>
                <div class="flex items-center justify-center h-10 w-10 transition-colors duration-500"
                    :class="theme === 'day' ? 'text-blue-600' : 'text-orange-500'">
                    <span class="text-5xl mb-2">+</span>
                </div>
                <span class="text-3xl tracking-tighter transition-colors duration-500 font-sans leading-none"
                    :class="theme === 'day' ? 'text-blue-600' : 'text-orange-500'">
                    Plus
                </span>
            </a>

            <nav class="hidden md:flex gap-10">
                <a href="/" class="text-lg font-black hover:text-blue-500 transition-colors">الرئيسية</a>
                <a href="/planner" class="text-lg font-black hover:text-blue-500 transition-colors">مخطط الدروس</a>
                <a href="/profile" class="text-lg font-black hover:text-blue-500 transition-colors">الملف الشخصي</a>
            </nav>

            <button @click="theme = (theme === 'day' ? 'night' : 'day'); localStorage.setItem('theme', theme)"
                    class="p-3 rounded-xl border transition-all hover:rotate-12 shadow-sm"
                    :class="theme === 'day' ? 'border-orange-200 bg-orange-50' : 'border-gray-700 bg-gray-800'">
                <span x-show="theme === 'day'" class="text-xl">🌙</span>
                <span x-show="theme === 'night'" class="text-xl">☀️</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-20 py-16 border-t text-center no-print"
            :class="theme === 'day' ? 'bg-white border-orange-50' : 'bg-[#161616] border-gray-800'">
        <div class="max-w-2xl mx-auto flex flex-col items-center space-y-6">
            <div class="inline-flex items-center gap-3 opacity-30 grayscale hover:grayscale-0 transition-all duration-500 font-black">
                <span class="text-2xl tracking-tight leading-none" :class="theme === 'day' ? 'text-slate-900' : 'text-white'">معلم</span>
                <div class="flex items-center justify-center h-8 w-8" :class="theme === 'day' ? 'text-blue-600' : 'text-orange-500'">
                    <span class="text-4xl mb-1">+</span>
                </div>
                <span class="text-2xl tracking-tighter font-sans leading-none" :class="theme === 'day' ? 'text-blue-600' : 'text-orange-500'">Plus</span>
            </div>
            <p class="opacity-60 text-lg font-bold">معلم بلس - رفيقك نحو تعليم مخصص، ممتع، وذو أثر ملموس.</p>
        </div>
    </footer>
</body>
</html>
