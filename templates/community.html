
{% extends 'base.html' %}
{% block content %}
<div class="max-w-4xl mx-auto space-y-12 animate-fadeIn">
    <div class="text-center space-y-4">
        <h1 class="text-5xl font-black">مجتمع المعلمين المبدعين</h1>
        <p class="text-xl opacity-60">تبادل الخبرات، استلهم الأفكار، وشارك نجاحاتك مع زملائك</p>
    </div>

    <!-- Create Post Mockup -->
    <div class="p-8 rounded-[2.5rem] shadow-lg border" :class="theme === 'day' ? 'bg-white border-blue-50' : 'bg-[#1E1E1E] border-gray-800'">
        <textarea class="w-full p-6 rounded-2xl border-none focus:ring-0 text-xl bg-transparent" placeholder="بماذا تفكر اليوم يا زميلي المبدع؟"></textarea>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-dashed">
            <div class="flex gap-4">
                <button class="p-2 opacity-60 hover:opacity-100">🖼️ صورة</button>
                <button class="p-2 opacity-60 hover:opacity-100">🔗 رابط خطة</button>
            </div>
            <button class="px-8 py-3 rounded-full text-white font-bold" :class="theme === 'day' ? 'bg-blue-600' : 'bg-orange-600'">نشر</button>
        </div>
    </div>

    <!-- Feed -->
    <div class="space-y-8">
        {% for post in posts %}
        <div class="p-10 rounded-[3rem] shadow-xl border transition-all hover:scale-[1.01]" 
             :class="theme === 'day' ? 'bg-white border-orange-50' : 'bg-[#1E1E1E] border-gray-800'">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-400 to-teal-400"></div>
                <div>
                    <h4 class="text-2xl font-black">{{ post.author }}</h4>
                    <p class="text-sm opacity-50">{{ post.role }} • {{ post.time }}</p>
                </div>
            </div>
            <p class="text-2xl leading-relaxed mb-6">{{ post.content }}</p>
            <div class="flex gap-8 border-t pt-6 opacity-60 font-bold">
                <button class="hover:text-red-500 transition-colors">❤️ {{ post.likes }} إعجاب</button>
                <button class="hover:text-blue-500 transition-colors">💬 تعليق</button>
                <button class="hover:text-teal-500 transition-colors">🔄 مشاركة</button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
